monitor.bluez.rules = [
  {
    matches = [
      {
        # Matches your Zone 305 specifically
        "device.name": "~bluez_card.94_02_30_2F_A7_D6*"
      }
    ],
    actions = {
      update-props = {
        # Force the order of preference. Putting HFP/HSP first
        # ensures the mic is active immediately on connect.
        "bluez5.auto-connect": [ "hfp_hf", "hsp_hs", "a2dp_sink" ],

        # This triggers the switch as soon as an app requests the mic
        "bluez5.autoswitch-to-headset-profile": true,

        # This ensures it is treated as a primary communication device
        "device.intended-roles": [ "Communication" ]

        # Optional: Force mSBC for high-quality voice
        "bluez5.msbc-support": true
      }
    }
  }
]
